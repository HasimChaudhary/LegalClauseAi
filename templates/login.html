<!doctype html>
<html>

<head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Login</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232D11E9'%3E%3Cpath d='M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z'/%3E%3C/svg%3E">
        <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100 dark:bg-[oklch(14.1%_0.005_285.823)] dark:text-gray-100 transition-colors duration-200">

        <div
                class="bg-white dark:bg-[oklch(18%_0.005_285.823)] dark:border-white/5 text-gray-500 max-w-96 mx-4 md:p-6 p-4 text-left text-sm rounded-xl shadow-[0px_0px_10px_0px] shadow-black/10">

                <!-- Flash messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                <div class="mb-3">
                        {% for category, msg in messages %}
                        <div class="mb-2 p-2 rounded 
                {% if category == 'success' %} bg-green-100 text-green-700 
                {% elif category == 'danger' or category == 'warning' %} bg-red-100 text-red-700 
                {% else %} bg-gray-100 text-gray-700 dark:text-gray-300 
                {% endif %}">
                                {{ msg }}
                        </div>
                        {% endfor %}
                </div>
                {% endif %}
                {% endwith %}

                <h2 class="text-2xl font-semibold mb-6 text-center text-gray-800 dark:text-gray-200">Welcome back</h2>

                <!-- LOGIN FORM -->
                <form method="POST" action="{{ url_for('login') }}">
                        <!-- safe next redirect (server checks it starts with "/") -->
                        <input type="hidden" name="next" value="{{ request.args.get('next', '/') }}">

                        <input name="email" id="email"
                                class="w-full bg-transparent border my-3 border-gray-500/30 outline-none rounded-full py-2.5 px-4"
                                type="email" placeholder="Enter your email" required
                                value="{{ request.form.get('email', '') }}">

                        <input name="password" id="password"
                                class="w-full bg-transparent border mt-1 border-gray-500/30 outline-none rounded-full py-2.5 px-4"
                                type="password" placeholder="Enter your password" required>

                        <div class="text-right py-4">
                                <a class="text-blue-600 underline" href="#"> </a>
                        </div>

                        <button type="submit" class="w-full mb-3 bg-indigo-500 py-2.5 rounded-full text-white">
                                Log in
                        </button>
                </form>

                <p class="text-center mt-2">
                        Don’t have an account?
                        <a href="{{ url_for('register') }}" class="text-blue-500 underline">Signup</a>
                </p>


        </div>


    <script>
        function setupThemeToggle(btnId, darkIconId, lightIconId) {
            var themeToggleBtn = document.getElementById(btnId);
            var themeToggleDarkIcon = document.getElementById(darkIconId);
            var themeToggleLightIcon = document.getElementById(lightIconId);

            if (!themeToggleBtn || !themeToggleDarkIcon || !themeToggleLightIcon) return;

            // Change the icons inside the button based on previous settings
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                themeToggleLightIcon.classList.remove('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
            }

            themeToggleBtn.addEventListener('click', function() {
                // toggle icons inside button
                themeToggleDarkIcon.classList.toggle('hidden');
                themeToggleLightIcon.classList.toggle('hidden');

                // if set via local storage previously
                if (localStorage.getItem('theme')) {
                    if (localStorage.getItem('theme') === 'light') {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }

                // if NOT set via local storage previously
                } else {
                    if (document.documentElement.classList.contains('dark')) {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    } else {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupThemeToggle('theme-toggle', 'theme-toggle-dark-icon', 'theme-toggle-light-icon');
            setupThemeToggle('theme-toggle-mobile', 'theme-toggle-dark-icon-mobile', 'theme-toggle-light-icon-mobile');
        });
    </script>
</body>

</html>
