<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case-Based Learning – LegalClause AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232D11E9'%3E%3Cpath d='M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap');

        * {
            font-family: 'Poppins', sans-serif;
        }

        .serif-font {
            font-family: 'Crimson Pro', serif;
        }

        .animated-gradient-btn {
            background-size: 200% auto;
            transition: 0.5s;
            background-image: linear-gradient(to right, #4f46e5 0%, #7c3aed 51%, #4f46e5 100%);
        }
        
        .animated-gradient-btn:hover {
            background-position: right center;
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script>
        // On page load or when changing themes, best to add inline in `head` to avoid FOUC
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
</head>

<body class="bg-gray-50 dark:bg-[oklch(14.1%_0.005_285.823)] min-h-screen flex flex-col dark:bg-[oklch(14.1%_0.005_285.823)] dark:text-gray-100 transition-colors duration-200">
    <nav class="flex items-center justify-between px-6 md:px-16 py-4 bg-white dark:bg-[oklch(18%_0.005_285.823)] dark:border-white/5 shadow-sm dark:shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
        <a href="{{ url_for('learning') }}" class="flex items-center gap-2 text-indigo-600 font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                    clip-rule="evenodd" />
            </svg>
            Back to Dashboard
        </a>
        <span class="text-gray-900 dark:text-gray-100 dark:text-gray-100 dark:text-gray-100 font-bold text-xl">Case-Based Learning</span>
        <div class="w-20"></div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-12 max-w-7xl">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Left Side: Scenario Document -->
            <div class="lg:col-span-5 flex flex-col h-full">
                <div class="bg-[#fdfbf7] dark:bg-[#1a1a24] p-8 md:p-12 rounded-3xl border border-gray-200 dark:border-white/10 shadow-2xl relative h-full flex flex-col">
                    <!-- Decorative pins/lines -->
                    <div class="absolute top-0 left-12 w-px h-full bg-red-500/20 dark:bg-red-500/10"></div>
                    <div class="absolute top-0 left-14 w-px h-full bg-red-500/20 dark:bg-red-500/10"></div>
                    
                    <div class="relative z-10 pl-8 flex-grow">
                        <div class="flex items-center gap-3 mb-8 pb-4 border-b border-gray-300 dark:border-white/10">
                            <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Case Docket No. {{ range(1000, 9999) | random }}</h2>
                        </div>
                        
                        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-6 font-serif">Statement of Facts</h1>
                        <p class="text-gray-800 dark:text-gray-300 leading-relaxed text-lg serif-font">
                            {{ scenario }}
                        </p>
                    </div>
                </div>
            </div>

            <!-- Right Side: Evaluation Form & Results -->
            <div class="lg:col-span-7 flex flex-col space-y-8">
                
                <div class="bg-white dark:bg-[#11111e] p-8 md:p-10 rounded-3xl border border-gray-100 dark:border-white/5 shadow-xl">
                    <div class="mb-8">
                        <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">Legal Analysis</h2>
                        <p class="text-gray-500 dark:text-gray-400">Put on your lawyer hat. Which laws apply to this case?</p>
                    </div>

                    <form id="case-form" class="space-y-6">
                        <div class="group">
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 group-focus-within:text-indigo-600 transition-colors">Applicable Clause/Section</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                </span>
                                <input type="text" name="clause" placeholder="e.g. Article 21 of Indian Constitution"
                                    class="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-gray-100 dark:border-white/5 bg-gray-50 dark:bg-[#1a1a2e] focus:bg-white dark:focus:bg-[#11111e] focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all dark:text-white placeholder-gray-400"
                                    required>
                            </div>
                        </div>
                        
                        <div class="group">
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 group-focus-within:text-indigo-600 transition-colors">Legal Reasoning</label>
                            <textarea name="reasoning" rows="5" placeholder="Explain why this law applies based on the facts provided..."
                                class="w-full p-5 rounded-2xl border-2 border-gray-100 dark:border-white/5 bg-gray-50 dark:bg-[#1a1a2e] focus:bg-white dark:focus:bg-[#11111e] focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all dark:text-white placeholder-gray-400 resize-none"
                                required></textarea>
                        </div>
                        
                        <button type="submit"
                            class="w-full animated-gradient-btn text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-500/30 active:scale-[0.98] flex items-center justify-center gap-2">
                            <span>Submit Analysis</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </form>
                </div>

                <div id="evaluation-result" class="hidden">
                    <div class="bg-white dark:bg-[#11111e] p-8 md:p-10 rounded-3xl border border-indigo-100 dark:border-indigo-900/50 shadow-2xl relative overflow-hidden">
                        <!-- Decorative glow -->
                        <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl"></div>
                        
                        <div class="relative z-10 space-y-8">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-2xl flex items-center justify-center shrink-0">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-900 dark:text-white">AI Evaluation</h2>
                            </div>

                            <div id="evaluation-content" class="space-y-6">
                                <!-- Content will be injected here -->
                            </div>
                            
                            <hr class="border-gray-100 dark:border-white/10">

                            <button onclick="location.reload()"
                                class="w-full bg-gray-50 dark:bg-gray-800 text-gray-700 dark:text-gray-300 py-4 rounded-2xl font-semibold hover:bg-gray-100 dark:hover:bg-gray-700 transition-all flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                                Try Another Case
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        document.getElementById('case-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Evaluating...';

            try {
                const response = await fetch('/api/learning/evaluate-case', {
                    method: 'POST',
                    body: JSON.stringify({
                        scenario: "{{ scenario }}",
                        user_clause: formData.get('clause'),
                        user_reasoning: formData.get('reasoning')
                    }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();

                const resultDiv = document.getElementById('evaluation-result');
                const contentDiv = document.getElementById('evaluation-content');

                contentDiv.innerHTML = `
                    <div class="flex items-start gap-4 p-5 bg-indigo-50/50 dark:bg-indigo-900/20 rounded-2xl border border-indigo-100 dark:border-indigo-800/50">
                        <div class="mt-1">
                            <span class="px-3 py-1 bg-indigo-600 text-white rounded-full text-xs font-bold shadow-sm uppercase tracking-wider">Correct Clause</span>
                        </div>
                        <span class="font-semibold text-gray-800 dark:text-gray-200 text-lg leading-tight pt-0.5">${data.correct_clause}</span>
                    </div>
                    
                    <div class="space-y-6 pt-2">
                        <div>
                            <h4 class="flex items-center gap-2 font-bold text-gray-900 dark:text-white text-sm uppercase tracking-wider mb-3">
                                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Reasoning Analysis
                            </h4>
                            <p class="text-gray-700 dark:text-gray-300 leading-relaxed bg-gray-50 dark:bg-gray-800/50 p-5 rounded-2xl border border-gray-100 dark:border-white/5">${data.reasoning}</p>
                        </div>
                        <div>
                            <h4 class="flex items-center gap-2 font-bold text-gray-900 dark:text-white text-sm uppercase tracking-wider mb-3">
                                <svg class="w-4 h-4 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                                Simple Explanation
                            </h4>
                            <p class="text-gray-700 dark:text-gray-300 leading-relaxed bg-emerald-50/50 dark:bg-emerald-900/10 p-5 rounded-2xl border border-emerald-100 dark:border-emerald-900/30">${data.explanation}</p>
                        </div>
                    </div>
                `;

                resultDiv.classList.remove('hidden');
                e.target.classList.add('hidden');
                resultDiv.scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                alert('Error evaluating case. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Answer';
            }
        });
    </script>

    <script>
        function setupThemeToggle(btnId, darkIconId, lightIconId) {
            var themeToggleBtn = document.getElementById(btnId);
            var themeToggleDarkIcon = document.getElementById(darkIconId);
            var themeToggleLightIcon = document.getElementById(lightIconId);

            if (!themeToggleBtn || !themeToggleDarkIcon || !themeToggleLightIcon) return;

            // Change the icons inside the button based on previous settings
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                themeToggleLightIcon.classList.remove('hidden');
            } else {
                themeToggleDarkIcon.classList.remove('hidden');
            }

            themeToggleBtn.addEventListener('click', function() {
                // toggle icons inside button
                themeToggleDarkIcon.classList.toggle('hidden');
                themeToggleLightIcon.classList.toggle('hidden');

                // if set via local storage previously
                if (localStorage.getItem('theme')) {
                    if (localStorage.getItem('theme') === 'light') {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }

                // if NOT set via local storage previously
                } else {
                    if (document.documentElement.classList.contains('dark')) {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    } else {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setupThemeToggle('theme-toggle', 'theme-toggle-dark-icon', 'theme-toggle-light-icon');
            setupThemeToggle('theme-toggle-mobile', 'theme-toggle-dark-icon-mobile', 'theme-toggle-light-icon-mobile');
        });
    </script>
</body>

</html>
